upstream mcp_backend {
    server 127.0.0.1:8848 fail_timeout=0;
    keepalive 32;
}

server {
    server_name mcp.highway.rodmena.app;
    listen 80;
    listen [::]:80;

    access_log /var/log/nginx/mcp.highway.rodmena.app.access.log combined;
    error_log  /var/log/nginx/mcp.highway.rodmena.app.error.log warn;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    client_max_body_size 10M;

    # Static info page for humans.
    root /home/farshid/highway-stack/highway-mcp/web;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # MCP streamable-http endpoint. Long-lived + SSE: buffering MUST be off or
    # the client hangs waiting for streamed responses.
    location /mcp {
        proxy_pass http://mcp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
